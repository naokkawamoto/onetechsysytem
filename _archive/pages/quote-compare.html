<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>見積バージョン比較 — 社内業務管理システム</title>
    <meta name="page-name" content="quote-compare">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/app.css">
</head>
<body data-page-name="quote-compare">
<main class="main-content">
        <div id="quote-compare" class="page-root" data-page-name="quote-compare">
<h3 class="mb-4">見積バージョン比較 - QUO-2026-0045</h3>

            <div class="row mb-4">
                <div class="col-md-6">
                    <label class="form-label">比較元バージョン</label>
                    <select class="form-select">
                        <option>v2.0 (2026/03/14)</option>
                        <option>v1.0 (2026/03/10)</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">比較先バージョン</label>
                    <select class="form-select">
                        <option>v2.1 (2026/03/15) - 最新</option>
                        <option>v2.0 (2026/03/14)</option>
                    </select>
                </div>
            </div>

            <div class="form-section">
                <h6 class="form-section-title">基本情報の比較</h6>
                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>項目</th>
                            <th style="background-color: #f0f8ff;">v2.0</th>
                            <th style="background-color: #f0fff0;">v2.1 (最新)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <th>見積金額</th>
                            <td class="amount-cell">¥18,200,000</td>
                            <td class="amount-cell" style="background-color: #ffffcc;"><strong>¥18,500,000</strong></td>
                        </tr>
                        <tr>
                            <th>OTA原価</th>
                            <td class="amount-cell">¥13,500,000</td>
                            <td class="amount-cell" style="background-color: #ffffcc;"><strong>¥13,800,000</strong></td>
                        </tr>
                        <tr>
                            <th>工期</th>
                            <td>6.5人月</td>
                            <td>6.5人月</td>
                        </tr>
                        <tr>
                            <th>納期</th>
                            <td>2026/06/30</td>
                            <td>2026/06/30</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="form-section">
                <h6 class="form-section-title">明細の差分</h6>
                <div class="table-responsive">
                    <table class="table table-sm">
                        <thead>
                            <tr>
                                <th>作業項目</th>
                                <th>v2.0 工数</th>
                                <th>v2.1 工数</th>
                                <th>v2.0 金額</th>
                                <th>v2.1 金額</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>要件定義</td>
                                <td>120h</td>
                                <td>120h</td>
                                <td class="amount-cell">960,000</td>
                                <td class="amount-cell">960,000</td>
                            </tr>
                            <tr style="background-color: #ffffcc;">
                                <td>開発</td>
                                <td>750h</td>
                                <td><strong>800h</strong></td>
                                <td class="amount-cell">5,625,000</td>
                                <td class="amount-cell"><strong>6,000,000</strong></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="text-end">
                <button class="btn btn-outline-secondary" onclick="location.href='quote-detail.html'"><i class="bi bi-arrow-left"></i> 戻る</button>
                <button class="btn btn-outline-primary"><i class="bi bi-file-pdf"></i> PDF出力</button>
            </div>
        </div>

<!-- 続く画面... -->
</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
