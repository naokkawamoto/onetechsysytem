<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注文書作成 — 社内業務管理システム</title>
    <meta name="page-name" content="purchase-order-create">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/app.css">
</head>
<body data-page-name="purchase-order-create">
<main class="main-content">
        <div id="purchase-order-create" class="page-root" data-page-name="purchase-order-create">
<h4 class="mb-4">注文書作成</h4>

            <div class="form-section">
                <h6 class="form-section-title">基本情報</h6>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">発注先 <span class="text-danger">*</span></label>
                        <select class="form-select">
                            <option>OTA拠点A</option>
                            <option>OTA拠点B</option>
                            <option>ベンダーC</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">案件名 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" value="ECサイトリニューアル">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">注文日</label>
                        <input type="date" class="form-control" value="2026-03-15">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">納期</label>
                        <input type="date" class="form-control">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">支払条件</label>
                        <input type="text" class="form-control" value="月末締め翌月末払い">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h6 class="form-section-title">注文明細</h6>
                <button class="btn btn-sm btn-primary mb-2"><i class="bi bi-plus-circle"></i> 行追加</button>
                <div class="table-responsive">
                    <table class="table table-bordered">
                        <thead>
                            <tr>
                                <th>品名</th>
                                <th>数量</th>
                                <th>単位</th>
                                <th>単価(円)</th>
                                <th>金額(円)</th>
                                <th>備考</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td><input type="text" class="form-control form-control-sm" value="システム開発業務"></td>
                                <td><input type="number" class="form-control form-control-sm" value="1"></td>
                                <td><input type="text" class="form-control form-control-sm" value="式"></td>
                                <td><input type="number" class="form-control form-control-sm text-end" value="13800000"></td>
                                <td class="amount-cell">13,800,000</td>
                                <td><input type="text" class="form-control form-control-sm"></td>
                                <td><button class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="row">
                    <div class="col-md-8"></div>
                    <div class="col-md-4">
                        <div class="card">
                            <div class="card-body">
                                <table class="table table-sm table-borderless mb-0">
                                    <tr><th>小計:</th><td class="amount-cell">¥12,545,455</td></tr>
                                    <tr><th>消費税(10%):</th><td class="amount-cell">¥1,254,545</td></tr>
                                    <tr class="table-primary"><th><strong>合計:</strong></th><td class="amount-cell"><strong>¥13,800,000</strong></td></tr>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h6 class="form-section-title">備考・特記事項</h6>
                <textarea class="form-control" rows="3"></textarea>
            </div>

            <div class="text-end">
                <button class="btn btn-secondary" onclick="location.href='purchase-list.html'">キャンセル</button>
                <button class="btn btn-outline-primary"><i class="bi bi-eye"></i> プレビュー</button>
                <button class="btn btn-primary"><i class="bi bi-file-pdf"></i> 注文書生成</button>
            </div>
        </div>

<!-- 続く請求・入金管理... -->
</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/layout.js"></script>
</body>
</html>
