<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クライアント一覧 — 社内業務管理システム</title>
    <meta name="page-name" content="client-list">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/app.css">
    <style>
        #client-list .form-section.client-list-filters {
            padding: 0.75rem 1rem;
        }
        #client-list .client-list-filters .form-label {
            font-size: 0.8125rem;
            margin-bottom: 0.2rem;
        }
        #client-list .table {
            font-size: 0.8125rem;
            --bs-table-cell-padding-y: 0.45rem;
            --bs-table-cell-padding-x: 0.5rem;
        }
        #client-list .table thead th {
            font-size: 0.75rem;
            font-weight: 600;
            white-space: nowrap;
            vertical-align: middle;
        }
        #client-list .table tbody td {
            vertical-align: middle;
        }
        #client-list .table .amount-cell {
            font-size: 0.8125rem;
            text-align: right;
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }
    </style>
</head>
<body data-page-name="client-list">
<main class="main-content">
        <div id="client-list" class="page-root" data-page-name="client-list">
            <!-- 検索エリア -->
            <div class="form-section client-list-filters mb-3">
                <div class="d-flex justify-content-end mb-2">
                    <button type="button" class="btn btn-success btn-sm" onclick="location.href='client-create.html'"><i class="bi bi-plus-circle"></i> 新規登録</button>
                </div>
                <div class="row g-2">
                    <div class="col-6 col-md-3">
                        <label class="form-label">会社名</label>
                        <input type="text" class="form-control form-control-sm" placeholder="会社名で検索">
                    </div>
                    <div class="col-6 col-md-3">
                        <label class="form-label">業種</label>
                        <select class="form-select form-select-sm">
                            <option>すべて</option>
                            <option>IT・通信</option>
                            <option>製造業</option>
                            <option>卸売・小売</option>
                        </select>
                    </div>
                    <div class="col-6 col-md-3">
                        <label class="form-label">取引状況</label>
                        <select class="form-select form-select-sm">
                            <option>すべて</option>
                            <option>取引中</option>
                            <option>商談中</option>
                            <option>休眠中</option>
                        </select>
                    </div>
                    <div class="col-6 col-md-3">
                        <label class="form-label">担当営業</label>
                        <select class="form-select form-select-sm">
                            <option>すべて</option>
                            <option>田中太郎</option>
                            <option>佐藤花子</option>
                        </select>
                    </div>
                </div>
                <div class="d-flex flex-wrap gap-2 mt-2">
                    <button type="button" class="btn btn-primary btn-sm"><i class="bi bi-search"></i> 検索</button>
                    <button type="button" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-clockwise"></i> リセット</button>
                </div>
            </div>

            <!-- 一覧テーブル -->
            <div class="table-responsive">
                <table class="table table-hover table-sm">
                    <thead>
                        <tr>
                            <th><input type="checkbox"></th>
                            <th>会社名</th>
                            <th>業種</th>
                            <th>担当者</th>
                            <th>担当営業</th>
                            <th>取引状況</th>
                            <th>累計請求数</th>
                            <th>累計請求額</th>
                            <th>最終更新</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="clickable" onclick="location.href='client-detail.html'" role="button" tabindex="0">
                            <td onclick="event.stopPropagation()"><input type="checkbox"></td>
                            <td><strong>株式会社テックソリューション</strong></td>
                            <td>IT・通信</td>
                            <td>山田太郎</td>
                            <td>田中太郎</td>
                            <td><span class="badge bg-success">取引中</span></td>
                            <td>15</td>
                            <td class="amount-cell">¥245,800,000</td>
                            <td>2026/03/15</td>
                        </tr>
                        <tr class="clickable" onclick="location.href='client-detail.html'" role="button" tabindex="0">
                            <td onclick="event.stopPropagation()"><input type="checkbox"></td>
                            <td><strong>サンプル商事株式会社</strong></td>
                            <td>卸売・小売</td>
                            <td>鈴木花子</td>
                            <td>佐藤花子</td>
                            <td><span class="badge bg-warning text-dark">商談中</span></td>
                            <td>3</td>
                            <td class="amount-cell">¥45,200,000</td>
                            <td>2026/03/12</td>
                        </tr>
                        <tr class="clickable" onclick="location.href='client-detail.html'" role="button" tabindex="0">
                            <td onclick="event.stopPropagation()"><input type="checkbox"></td>
                            <td><strong>株式会社グローバルテック</strong></td>
                            <td>製造業</td>
                            <td>高橋一郎</td>
                            <td>田中太郎</td>
                            <td><span class="badge bg-success">取引中</span></td>
                            <td>8</td>
                            <td class="amount-cell">¥128,500,000</td>
                            <td>2026/03/10</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <nav>
                <ul class="pagination justify-content-end">
                    <li class="page-item disabled"><a class="page-link">前へ</a></li>
                    <li class="page-item active"><a class="page-link">1</a></li>
                    <li class="page-item"><a class="page-link">2</a></li>
                    <li class="page-item"><a class="page-link">3</a></li>
                    <li class="page-item"><a class="page-link">次へ</a></li>
                </ul>
            </nav>
        </div>
</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/layout.js"></script>
    <script>
(function () {
    document.querySelectorAll('#client-list tbody tr.clickable').forEach(function (tr) {
        tr.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                tr.click();
            }
        });
    });
})();
    </script>
</body>
</html>
