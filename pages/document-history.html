<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帳票出力履歴 — 社内業務管理システム</title>
    <meta name="page-name" content="document-history">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/app.css">
</head>
<body data-page-name="document-history">
<main class="main-content">
        <div id="document-history" class="page-root" data-page-name="document-history">
            <div class="form-section mb-4">
                <div class="row g-3">
                    <div class="col-md-3">
                        <label class="form-label">帳票種類</label>
                        <select class="form-select">
                            <option>すべて</option>
                            <option>見積書</option>
                            <option>請求書</option>
                            <option>納品書</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">出力期間</label>
                        <select class="form-select">
                            <option>今月</option>
                            <option>先月</option>
                            <option>過去3ヶ月</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">&nbsp;</label>
                        <button class="btn btn-primary d-block w-100"><i class="bi bi-search"></i> 検索</button>
                    </div>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>帳票番号</th>
                            <th>種類</th>
                            <th>案件名</th>
                            <th>クライアント</th>
                            <th>出力日時</th>
                            <th>出力者</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>QUO-2026-0045</td>
                            <td><span class="badge bg-primary">見積書</span></td>
                            <td>ECサイトリニューアル</td>
                            <td>株式会社テックソリューション</td>
                            <td>2026/03/15 16:30</td>
                            <td>田中太郎</td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i> 表示</button>
                                <button class="btn btn-sm btn-outline-success"><i class="bi bi-download"></i> DL</button>
                            </td>
                        </tr>
                        <tr>
                            <td>INV-2026-0098</td>
                            <td><span class="badge bg-warning text-dark">請求書</span></td>
                            <td>在庫管理システム開発</td>
                            <td>サンプル商事株式会社</td>
                            <td>2026/03/14 10:15</td>
                            <td>経理_佐藤</td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary"><i class="bi bi-eye"></i> 表示</button>
                                <button class="btn btn-sm btn-outline-success"><i class="bi bi-download"></i> DL</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/layout.js"></script>
</body>
</html>
