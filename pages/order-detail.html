<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>受注詳細 — 社内業務管理システム</title>
    <meta name="page-name" content="order-detail">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/app.css">
    <style>
        .order-detail-embed-wrap {
            border: 1px solid #dee2e6;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 0.125rem 0.5rem rgba(0, 0, 0, 0.06);
        }
        .order-detail-embed-wrap iframe {
            display: block;
            width: 100%;
            min-height: calc(100vh - 200px);
            height: 820px;
            vertical-align: top;
        }
    </style>
</head>
<body data-page-name="order-detail">
<main class="main-content">
        <div id="order-detail" class="page-root" data-page-name="order-detail">
            <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-3">
                <div>
                    <h4 class="mb-1">受注詳細</h4>
                    <p class="text-muted small mb-0">見積書（Ver.2）を表示しています。行から渡した見積に紐づく内容です。</p>
                </div>
                <a class="btn btn-outline-secondary btn-sm" href="order-list.html"><i class="bi bi-arrow-left"></i> 受注一覧へ戻る</a>
            </div>
            <div class="order-detail-embed-wrap">
                <iframe id="order-quote-embed" title="見積書（Ver.2）" src="about:blank"></iframe>
            </div>
        </div>
</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/layout.js"></script>
    <script>
(function () {
    function buildQuoteEmbedSrc() {
        var p = new URLSearchParams(typeof location !== 'undefined' ? location.search : '');
        if (!p.get('id')) p.set('id', '00001');
        if (!p.get('no')) p.set('no', 'QUO-2026-0045');
        if (!p.get('ver')) p.set('ver', '2');
        if (!p.get('status')) p.set('status', 'pending');
        p.set('embed', 'order');
        p.set('chrome', '0');
        return 'quote-detail.html?' + p.toString();
    }
    function initOrderDetailEmbed() {
        var f = document.getElementById('order-quote-embed');
        if (f) f.src = buildQuoteEmbedSrc();
    }
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', initOrderDetailEmbed);
    else initOrderDetailEmbed();
})();
    </script>
</body>
</html>
